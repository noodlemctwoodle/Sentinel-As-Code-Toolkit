# =============================================================================
# Microsoft Sentinel analytics rule -- Near-Real-Time (NRT)
# -----------------------------------------------------------------------------
# On-disk format : YAML  (Content/AnalyticalRules/)
# Deployed as    : NRT analytics rule
# -----------------------------------------------------------------------------
# NRT rules run about once a minute for low-latency detection. They deliberately
# OMIT the scheduling fields (queryFrequency, queryPeriod, triggerOperator,
# triggerThreshold) -- Sentinel manages the cadence. Use them for time-critical
# signals. Optional blocks below can be deleted if you don't need them.
# =============================================================================

# REQUIRED. Stable GUID used as the rule resource name. Do not change after first deploy.
id: {{GUID}}
name: Microsoft Sentinel Analytics Rule - Near Real-Time Template
description: |
  Identifies critical security events requiring immediate response using Near Real-Time processing.
  This template monitors privileged group modifications that could indicate privilege escalation attacks.
# REQUIRED. Alert severity: Informational | Low | Medium | High.
severity: High
# OPTIONAL. Data the rule depends on; drives connector-health hints in the portal.
requiredDataConnectors:
  - connectorId: WindowsSecurityEvents
    dataTypes:
      - SecurityEvent
# OPTIONAL. Whether the rule is enabled on deploy (defaults to true).
enabled: true
# OPTIONAL. MITRE ATT&CK coverage. tactics = camelCase tactic names;
# relevantTechniques = technique IDs (sub-techniques T####.### are supported).
tactics:
  - PrivilegeEscalation
  - Impact
  - Persistence
relevantTechniques:
  - T1078.003
  - T1098
  - T1484
# REQUIRED. The detection KQL. Columns projected here are referenced by the
# entityMappings, alertDetailsOverride, and customDetails blocks below.
query: |
  SecurityEvent
  | where EventID in (4728, 4732, 4756)  // Admin group modifications
  | where TimeGenerated >= ago(5m)
  | extend
      GroupName = TargetUserName,
      ModifiedBy = SubjectUserName,
      SourceComputer = Computer,
      Action = case(
          EventID == 4728, "User Added to Global Group",
          EventID == 4732, "User Added to Local Group", 
          EventID == 4756, "User Added to Universal Group",
          "Unknown Action"
      ),
      RiskLevel = case(
          GroupName contains "Admin", "Critical",
          GroupName contains "Domain", "High",
          GroupName contains "Enterprise", "Critical",
          "Medium"
      )
  | where RiskLevel in ("Critical", "High")  // Focus on high-risk groups
  | project 
      TimeGenerated, 
      SourceComputer, 
      ModifiedBy, 
      GroupName, 
      Action, 
      EventID, 
      RiskLevel
# OPTIONAL. Map query columns to Sentinel entities so alerts correlate into
# incidents and are investigable. Each identifier must map to a projected column.
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: ModifiedBy
      - identifier: Name
        columnName: ModifiedBy
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: SourceComputer
  - entityType: SecurityGroup
    fieldMappings:
      - identifier: ObjectGuid
        columnName: GroupName
# OPTIONAL. Build the alert title/description/severity per row from query columns
# using {{ColumnName}} tokens.
alertDetailsOverride:
  alertDisplayNameFormat: "Critical privilege escalation: {{ModifiedBy}} added to {{GroupName}} on {{SourceComputer}}"
  alertDescriptionFormat: "User {{ModifiedBy}} was added to privileged group {{GroupName}} on computer {{SourceComputer}}. Risk Level: {{RiskLevel}}"
  alertSeverityColumnName: RiskLevel
  alertTacticsColumnName: ""          # optional: column containing a comma-separated MITRE tactic list
# OPTIONAL. Surface extra query columns on the alert as key/value custom details.
customDetails:
  PrivilegeAction: Action
  TargetGroup: GroupName
  RiskAssessment: RiskLevel
  EventIdentifier: EventID
# OPTIONAL. How matches become alerts: SingleAlert (one per run) | AlertPerResult.
eventGroupingSettings:
  aggregationKind: SingleAlert
# OPTIONAL. Whether alerts create incidents, and how they group together.
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: false
    reopenClosedIncident: false
    lookbackDuration: PT1H
    matchingMethod: AllEntities
    groupByEntities:
      - Account
      - Host
# OPTIONAL. After an alert fires, suppress re-firing for this long (when suppressionEnabled is true).
suppressionDuration: PT1H
suppressionEnabled: false
# REQUIRED. Content version (bump on meaningful changes) and rule kind.
# kind: NRT runs near-real-time and ignores the scheduling fields.
version: 1.0.0
kind: NRT
# OPTIONAL. Free-form tags for organisation and filtering.
tags:
  - NRT
  - Critical
  - RealTime
  - PrivilegeEscalation