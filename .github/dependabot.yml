# Dependabot configuration for SentinelCodeGuard VS Code Extension
# Professional development toolkit for Microsoft Sentinel Analytics Rules
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Enable version updates for npm (TypeScript/JavaScript dependencies)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # Limit number of open pull requests for npm dependencies
    open-pull-requests-limit: 8
    # Use conventional-commit prefixes so Dependabot PR titles satisfy the
    # repository commit convention: chore(deps) for runtime dependencies and
    # chore(deps-dev) for development dependencies.
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group dependency updates to reduce PR noise
    groups:
      # VS Code extension dependencies
      vscode-extension-deps:
        patterns:
          - "@types/vscode"
          - "vscode-*"
        dependency-type: "development"
      # TypeScript toolchain
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "ts-*"
          - "@types/*"
        dependency-type: "development"
      # Testing and build tools
      build-and-test:
        patterns:
          - "mocha"
          - "@vscode/test-*"
          - "webpack*"
          - "esbuild"
          - "eslint*"
          - "prettier*"
        dependency-type: "development"
      # Production dependencies (runtime)
      production-dependencies:
        dependency-type: "production"
    # Ignore major version updates for critical dependencies to avoid breaking changes
    ignore:
      - dependency-name: "@types/vscode"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # js-yaml 5.x is a breaking API rewrite that removed the dump() options this
      # extension relies on (quotingType, condenseFlow and styles), so it fails to
      # compile. It is a dual CommonJS/ESM package, so the module format is fine;
      # the blocker is the API. Stay on 4.x until the dump calls are migrated.
      - dependency-name: "js-yaml"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions (CI/CD workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 3
    # Conventional-commit prefix for GitHub Actions version bumps: chore(deps).
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group all GitHub Actions updates together
    groups:
      github-actions:
        patterns:
          - "*"

# Additional configuration notes:
# - Weekly updates on Mondays to keep dependencies current
# - Grouped updates reduce PR noise for related dependencies
# - Major version updates ignored for critical VS Code and TypeScript deps
# - Separate timing for npm vs GitHub Actions to spread the load
# - Limited PR counts to prevent overwhelming the maintainer
